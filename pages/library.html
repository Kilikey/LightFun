<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 轻小说文库 · 次元书屋</title>
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/layout.css">
<link rel="stylesheet" href="../assets/css/pages/library.css">
</head>
<body>

<div class="deco">🌸</div>
<div class="deco">🎀</div>
<div class="deco">⭐</div>
<div class="deco">📖</div>
<div class="deco">✨</div>
<div class="deco">🌙</div>

<div class="content">

<!-- ===== 导航栏 ===== -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="./home.html" class="nav-logo">✦ 次元书屋</a>
    <div class="nav-links">
      <a href="./home.html">首页</a>
      <a href="./library.html" class="active">文库</a>
      <a href="./ranking.html">排行</a>
      <a href="./update-calendar.html">更新</a>
      <a href="./bookshelf.html">书架</a>
      <a href="./user.html">我的</a>
    </div>
    <div class="nav-search">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 搜索轻小说..." oninput="handleSearchInput()" onkeydown="handleSearchKey(event)" onfocus="showSearchPanel()" autocomplete="off">
        <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">✕</button>
        <div class="search-panel" id="searchPanel">
          <div class="search-section" id="searchSuggestions" style="display:none;">
            <div class="search-section-title">💡 搜索建议</div>
            <div class="search-suggestions" id="suggestionList"></div>
          </div>
          <div class="search-section" id="searchHistory" style="display:none;">
            <div class="search-section-title">🕐 搜索历史 <span class="clear-history" onclick="clearSearchHistory()">清空</span></div>
            <div class="search-history" id="historyList"></div>
          </div>
          <div class="search-section" id="searchHot">
            <div class="search-section-title">🔥 热门搜索</div>
            <div class="search-hot" id="hotSearchList"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="nav-user">
      <span class="avatar">三</span>
      <span>张三</span>
    </div>
  </div>
</nav>

<!-- ===== Hero 轮播 ===== -->
<div class="hero-carousel" id="heroCarousel">
  <div class="carousel-slide" id="slide0"></div>
  <div class="carousel-slide" id="slide1"></div>
  <div class="carousel-slide" id="slide2"></div>
  <div class="carousel-slide" id="slide3"></div>
  <div class="carousel-slide" id="slide4"></div>
  <div class="carousel-dots" id="carouselDots"></div>
  <button class="carousel-btn prev" onclick="changeSlide(-1)">‹</button>
  <button class="carousel-btn next" onclick="changeSlide(1)">›</button>
</div>

<!-- ===== 今日更新 ===== -->
<section class="section" id="updates">
  <div class="section-header">
    <h2>📬 今日更新</h2>
    <a href="#" class="more">查看全部 →</a>
  </div>
  <div class="update-list" id="updateList"></div>
</section>

<!-- ===== 热门排行 + 新书上架 ===== -->
<section class="section">
  <div class="two-col">
    <div>
      <div class="section-header">
        <h2>🔥 热门排行</h2>
        <a href="#" class="more">更多 →</a>
      </div>
      <div class="rank-list" id="rankList"></div>
    </div>
    <div>
      <div class="section-header">
        <h2>🆕 新书上架</h2>
        <a href="#" class="more">更多 →</a>
      </div>
      <div class="novel-grid" id="newBooksGrid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr))"></div>
    </div>
  </div>
</section>

<!-- ===== Tags 云集 ===== -->
<section class="section">
  <div class="section-header" style="justify-content:center;">
    <h2>🏷️ Tags 云集</h2>
  </div>
  <div class="tag-cloud" id="tagCloud"></div>
</section>

<!-- ===== 全部作品 ===== -->
<section class="section" id="allNovels">
  <div class="section-header">
    <h2>📚 全部作品</h2>
    <span style="font-size:.8rem;color:rgba(61,61,74,.3);font-weight:300;" id="novelCount">共 0 部</span>
  </div>
  <div class="novel-grid" id="novelGrid"></div>
</section>

<!-- ===== Footer ===== -->
<footer class="footer">
  <div class="footer-links">
    <a href="#">关于本站</a>
    <a href="#">帮助中心</a>
    <a href="#">版权声明</a>
    <a href="../index.html">退出登录</a>
  </div>
  <p>🌸 次元书屋 · 为每一位轻小说爱好者打造</p>
  <p style="margin-top:.3rem;">本站内容仅供展示 · 封面版权归原作者所有</p>
</footer>

</div>

<!-- ===== 模态框 ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ===== 脚本 ===== -->
<script src="../assets/js/utils/storage.js"></script>
<script src="../assets/js/utils/formatter.js"></script>
<script src="../assets/js/components/toast.js"></script>
<script src="../assets/js/pages/library.js"></script>

</body>
</html>
