<style>
/* ========== 页面专属样式：文库首页 ========== */

/* ---------- Hero 轮播 ---------- */
.hero-carousel {
  max-width: 1200px; margin: 2rem auto 0;
  padding: 0 2rem;
  position: relative;
  height: 340px;
  border-radius: 24px;
  overflow: hidden;
}
.carousel-slide {
  position: absolute; inset: 0;
  border-radius: 24px;
  opacity: 0; transition: opacity .8s ease, transform .8s ease;
  transform: scale(.95);
  display: flex; align-items: center; padding: 2.5rem 3rem;
  overflow: hidden;
  cursor: pointer;
}
.carousel-slide.active {
  opacity: 1; transform: scale(1);
}
.carousel-slide .slide-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: blur(20px) brightness(.85);
  transform: scale(1.1);
}
.carousel-slide .slide-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(30,20,40,.6), rgba(60,40,80,.3));
}
.carousel-slide .slide-content {
  position: relative; z-index: 2;
  display: flex; gap: 2rem; align-items: center;
  width: 100%;
}
.carousel-slide .slide-cover {
  width: 160px; height: 220px; border-radius: 12px;
  object-fit: cover;
  box-shadow: 0 12px 32px rgba(0,0,0,.35);
  border: 2px solid rgba(255,255,255,.15);
  flex-shrink: 0;
}
.carousel-slide .slide-text { color: #fff; flex: 1; }
.carousel-slide .slide-text h2 {
  font-family: var(--font-display);
  font-size: 1.8rem; font-weight: 700;
  margin-bottom: .3rem;
  text-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.carousel-slide .slide-text .author {
  font-size: .9rem; opacity: .7; margin-bottom: .6rem;
}
.carousel-slide .slide-text .desc {
  font-size: .85rem; opacity: .65;
  line-height: 1.7; max-width: 500px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.carousel-slide .slide-text .tags {
  display: flex; gap: .4rem; margin-top: .8rem; flex-wrap: wrap;
}
.carousel-slide .slide-text .tags span {
  padding: .15rem .65rem; border-radius: 100px;
  background: rgba(255,255,255,.15); backdrop-filter: blur(4px);
  font-size: .7rem; border: 1px solid rgba(255,255,255,.08);
}
.carousel-dots {
  position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
  display: flex; gap: .5rem; z-index: 5;
}
.carousel-dots span {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,.25); cursor: pointer;
  transition: all .3s ease;
}
.carousel-dots span.active { background: #fff; width: 24px; border-radius: 4px; }
.carousel-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 5; width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.12); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff; font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .25s ease;
}
.carousel-btn:hover { background: rgba(255,255,255,.2); }
.carousel-btn.prev { left: 1rem; }
.carousel-btn.next { right: 1rem; }

/* ---------- 轻小说网格 ---------- */
.novel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1.2rem;
}
.novel-card {
  background: rgba(255,255,255,.45);
  border: 1px solid rgba(255,255,255,.6);
  border-radius: 16px;
  overflow: hidden;
  transition: all .35s cubic-bezier(.34,1.56,.64,1);
  cursor: pointer;
  backdrop-filter: blur(4px);
}
.novel-card:hover {
  transform: translateY(-6px);
  background: rgba(255,255,255,.65);
  box-shadow: 0 12px 32px rgba(150,100,180,.1);
}
.novel-card .cover-wrap {
  width: 100%; aspect-ratio: 3/4;
  overflow: hidden;
  position: relative;
}
.novel-card .cover-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .4s ease;
}
.novel-card:hover .cover-wrap img { transform: scale(1.08); }
.novel-card .novel-info {
  padding: .7rem .8rem .9rem;
}
.novel-card .novel-info h4 {
  font-size: .85rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: .15rem;
}
.novel-card .novel-info .author {
  font-size: .7rem; color: rgba(61,61,74,.4); font-weight: 300;
}
.novel-card .novel-info .status {
  display: inline-block; font-size: .6rem; padding: .05rem .45rem;
  border-radius: 100px; margin-top: .3rem;
  background: rgba(176,124,216,.1); color: #8b6ab0;
}
.novel-card .novel-info .status.completed {
  background: rgba(76,175,80,.1); color: #4caf50;
}

/* ---------- 更新列表 ---------- */
.update-list { display: flex; flex-direction: column; gap: .6rem; }
.update-item {
  display: flex; align-items: center; gap: 1rem;
  padding: .8rem 1rem;
  background: rgba(255,255,255,.35);
  border: 1px solid rgba(255,255,255,.5);
  border-radius: 14px;
  transition: all .3s ease;
}
.update-item:hover {
  background: rgba(255,255,255,.55);
  transform: translateX(4px);
}
.update-item .u-cover {
  width: 44px; height: 60px; border-radius: 6px;
  object-fit: cover; flex-shrink: 0;
}
.update-item .u-info { flex: 1; min-width: 0; }
.update-item .u-info .u-title {
  font-size: .9rem; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.update-item .u-info .u-chapter {
  font-size: .75rem; color: rgba(61,61,74,.4); font-weight: 300;
}
.update-item .u-time {
  font-size: .7rem; color: rgba(61,61,74,.3);
  white-space: nowrap;
}

/* ---------- 排行列表 ---------- */
.rank-list { display: flex; flex-direction: column; gap: .5rem; }
.rank-item {
  display: flex; align-items: center; gap: .8rem;
  padding: .5rem .8rem;
  background: rgba(255,255,255,.3);
  border: 1px solid rgba(255,255,255,.5);
  border-radius: 12px;
  transition: all .25s ease;
}
.rank-item:hover {
  background: rgba(255,255,255,.5);
  transform: translateX(3px);
}
.rank-item .rank-num {
  width: 24px; text-align: center;
  font-family: var(--font-display);
  font-weight: 700; font-size: 1rem;
  color: rgba(61,61,74,.2);
}
.rank-item .rank-num.top3 { color: var(--color-accent); }
.rank-item .r-cover {
  width: 36px; height: 50px; border-radius: 4px;
  object-fit: cover; flex-shrink: 0;
}
.rank-item .r-info { flex: 1; min-width: 0; }
.rank-item .r-info .r-title {
  font-size: .85rem; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rank-item .r-info .r-score {
  font-size: .7rem; color: rgba(61,61,74,.35);
}
.rank-item .r-score .stars { color: var(--color-gold); }

/* ---------- Tags云集 ---------- */
.tag-cloud {
  display: flex; flex-wrap: wrap; gap: .6rem;
  justify-content: center; padding: 1rem 0;
}
.tag-cloud .tag {
  padding: .35rem 1.1rem; border-radius: 100px;
  font-size: .8rem; font-weight: 400;
  border: 1.5px solid rgba(176,124,216,.15);
  background: rgba(255,255,255,.35);
  color: rgba(61,61,74,.5);
  transition: all .3s ease;
  cursor: pointer;
  text-decoration: none;
}
.tag-cloud .tag:hover {
  background: rgba(176,124,216,.1);
  border-color: rgba(176,124,216,.3);
  transform: scale(1.05);
  color: #8b6ab0;
}
.tag-cloud .tag.s1 { font-size: .75rem; }
.tag-cloud .tag.s2 { font-size: .85rem; }
.tag-cloud .tag.s3 { font-size: .95rem; }
.tag-cloud .tag.s4 { font-size: 1.05rem; font-weight: 500; }
.tag-cloud .tag.s5 { font-size: 1.15rem; font-weight: 600; }

/* ---------- 模态框 ---------- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.3); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  padding: 2rem;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.7);
  border-radius: 24px;
  max-width: 700px; width: 100%;
  max-height: 85vh; overflow-y: auto;
  padding: 2rem 2.5rem;
  box-shadow: 0 24px 64px rgba(0,0,0,.08);
  position: relative;
}
.modal-box .close-btn {
  position: absolute; top: 1rem; right: 1.2rem;
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: rgba(61,61,74,.06);
  cursor: pointer; font-size: 1.1rem; color: rgba(61,61,74,.3);
  display: flex; align-items: center; justify-content: center;
  transition: all .25s ease;
}
.modal-box .close-btn:hover { background: rgba(61,61,74,.1); color: rgba(61,61,74,.6); }
.modal-body { display: flex; gap: 2rem; }
.modal-body img {
  width: 200px; height: 280px; border-radius: 12px;
  object-fit: cover; flex-shrink: 0;
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
}
.modal-body .m-info { flex: 1; }
.modal-body .m-info h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: .3rem; }
.modal-body .m-info .m-author { font-size: .85rem; color: rgba(61,61,74,.4); margin-bottom: .8rem; }
.modal-body .m-info .m-desc {
  font-size: .9rem; color: rgba(61,61,74,.55); font-weight: 300;
  line-height: 1.8; margin-bottom: 1rem;
}
.modal-body .m-info .m-tags { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.modal-body .m-info .m-tags span {
  padding: .15rem .7rem; border-radius: 100px;
  font-size: .7rem; background: rgba(176,124,216,.08); color: #8b6ab0;
}
.modal-body .m-info .m-chapters {
  font-size: .8rem; color: rgba(61,61,74,.3);
}
.modal-body .m-info .read-btn {
  display: inline-block; margin-top: 1rem;
  padding: .5rem 2rem; border-radius: 100px;
  background: linear-gradient(135deg, var(--color-secondary), var(--color-primary-light));
  color: #fff; border: none; font-size: .9rem; font-weight: 500;
  cursor: pointer; transition: all .3s ease;
  font-family: inherit;
}
.modal-body .m-info .read-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(176,124,216,.25);
}

/* ---------- Toast ---------- */
#toast {
  position: fixed; top: 1.2rem; left: 50%; transform: translateX(-50%) translateY(-20px);
  padding: .7rem 1.8rem; border-radius: 100px;
  background: rgba(40,30,50,.85); backdrop-filter: blur(16px);
  color: #fff; font-size: .9rem; z-index: 999;
  opacity: 0; transition: all .35s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none; white-space: nowrap;
  border: 1px solid rgba(255,255,255,.1);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ---------- 响应式 ---------- */
@media (max-width: 768px) {
  .hero-carousel { height: 280px; }
  .carousel-slide { padding: 1.5rem; }
  .carousel-slide .slide-cover { width: 100px; height: 140px; }
  .carousel-slide .slide-text h2 { font-size: 1.3rem; }
  .novel-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
}
@media (max-width: 640px) {
  .modal-body { flex-direction: column; align-items: center; }
  .modal-body img { width: 140px; height: 200px; }
  .modal-box { padding: 1.5rem; }
  .novel-grid { grid-template-columns: repeat(2, 1fr); gap: .8rem; }
}
</style>
</head>

const FEATURED = [NOVELS[0], NOVELS[1], NOVELS[10], NOVELS[11], NOVELS[4]];
let curSlide = 0, slideTimer;

/* ---------- 初始化 ---------- */
(function(){
  const dotsEl = document.getElementById('carouselDots');
  FEATURED.forEach((_,i) => {
    const d = document.createElement('span');
    d.addEventListener('click', ()=>{ goSlide(i); resetSlideTimer(); });
    dotsEl.appendChild(d);
  });

  for(let i=0;i<FEATURED.length;i++) renderSlide(i);
  goSlide(0);
  resetSlideTimer();

  renderUpdates();
  renderRank();
  renderNewBooks();
  renderNovelGrid(NOVELS);
  renderTags();

  const els = document.querySelectorAll('.a-l,.a-r,.a-b,.a-zb');
  if(els.length) {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if(entry.isIntersecting) entry.target.classList.add('a-visible');
      });
    }, { threshold: 0.1 });
    els.forEach(el => observer.observe(el));
  }

  // 异步加载 novels.json 作为未来验证（如果 fetch 可用则数据一致，不可用也不影响）
  try {
    fetch('../assets/data/novels.json')
      .then(r => r.json())
      .then(data => console.log('📚 novels.json 验证通过，共', data.length, '条'))
      .catch(() => {});
  } catch(e) {}
})();

/* ---------- 轮播 ---------- */
function renderSlide(idx) {
  const n = FEATURED[idx];
  const slide = document.getElementById('slide' + idx);
  if(!slide || !n) return;
  slide.innerHTML = `
    <div class="slide-bg" style="background-image:url('${n.cover}')"></div>
    <div class="slide-overlay"></div>
    <div class="slide-content">
      <img class="slide-cover" src="${n.cover}" alt="${n.title}" onerror="this.style.display='none'">
      <div class="slide-text">
        <h2>${n.title}</h2>
        <div class="author">✎ ${n.author}</div>
        <div class="desc">${n.desc}</div>
        <div class="tags">${n.tags.map(t=>'<span>#'+t+'</span>').join('')}</div>
      </div>
    </div>`;
}

function goSlide(n) {
  document.querySelectorAll('.carousel-slide').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.carousel-dots span').forEach(d=>d.classList.remove('active'));
  curSlide = ((n % FEATURED.length) + FEATURED.length) % FEATURED.length;
  document.getElementById('slide'+curSlide).classList.add('active');
  document.querySelectorAll('.carousel-dots span')[curSlide].classList.add('active');
}
function changeSlide(dir) { goSlide(curSlide+dir); resetSlideTimer(); }
function resetSlideTimer() {
  clearInterval(slideTimer);
  slideTimer = setInterval(() => goSlide(curSlide+1), 5000);
}

/* ---------- 更新列表 ---------- */
function renderUpdates() {
  const el = document.getElementById('updateList');
  const sorted = [...NOVELS].filter(n => n.update !== '完结' && n.update !== '长期休载' && n.update !== '1周前').sort((a,b) => {
    const order = {'2小时前':0,'3小时前':1,'5小时前':2,'昨天':3,'1天前':4,'2天前':5,'3天前':6,'4天前':7};
    return (order[a.update]||99) - (order[b.update]||99);
  }).slice(0, 8);
  el.innerHTML = sorted.map(n => `
    <div class="update-item" onclick="openModal(${n.id})">
      <img class="u-cover" src="${n.cover}" alt="${n.title}" onerror="this.style.display='none'">
      <div class="u-info">
        <div class="u-title">${n.title}</div>
        <div class="u-chapter">📖 ${n.updateCh || '新章节'}</div>
      </div>
      <div class="u-time">${n.update}</div>
    </div>`).join('');
}

/* ---------- 排行 ---------- */
function renderRank() {
  const el = document.getElementById('rankList');
  const sorted = [...NOVELS].sort((a,b) => b.score - a.score).slice(0, 6);
  el.innerHTML = sorted.map((n,i) => `
    <div class="rank-item" onclick="openModal(${n.id})">
      <div class="rank-num ${i<3?'top3':''}">${i+1}</div>
      <img class="r-cover" src="${n.cover}" alt="${n.title}" onerror="this.style.display='none'">
      <div class="r-info">
        <div class="r-title">${n.title}</div>
        <div class="r-score"><span class="stars">${Formatter.renderStars(n.score)}</span> ${n.score}</div>
      </div>
    </div>`).join('');
}

/* ---------- 新书上架 ---------- */
function renderNewBooks() {
  const el = document.getElementById('newBooksGrid');
  const newBooks = [NOVELS[13], NOVELS[18], NOVELS[15], NOVELS[16], NOVELS[19], NOVELS[12]];
  el.innerHTML = newBooks.map(n => `
    <div class="novel-card" onclick="openModal(${n.id})">
      <div class="cover-wrap">
        <img src="${n.cover}" alt="${n.title}" loading="lazy" onerror="this.style.display='none'">
      </div>
      <div class="novel-info">
        <h4>${n.title}</h4>
        <div class="author">${n.author}</div>
        <span class="status">${n.status==='completed'?'✅ 完结':'📖 连载中'}</span>
      </div>
    </div>`).join('');
}

/* ---------- 全部作品 / 搜索 ---------- */
function filterNovels() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q ? NOVELS.filter(n => n.title.includes(q) || n.author.includes(q)) : NOVELS;
  renderNovelGrid(filtered);
}
function renderNovelGrid(list) {
  const el = document.getElementById('novelGrid');
  document.getElementById('novelCount').textContent = '共 ' + list.length + ' 部';
  el.innerHTML = list.map(n => `
    <div class="novel-card" onclick="openModal(${n.id})">
      <div class="cover-wrap">
        <img src="${n.cover}" alt="${n.title}" loading="lazy" onerror="this.style.display='none'">
      </div>
      <div class="novel-info">
        <h4>${n.title}</h4>
        <div class="author">${n.author}</div>
        <span class="status ${n.status==='completed'?'completed':''}">${n.status==='completed'?'✅ 完结':'📖 连载中'}</span>
      </div>
    </div>`).join('');
}

/* ---------- Tags ---------- */
function renderTags() {
  const allTags = [
    {name:'异世界',size:5}, {name:'转生',size:4}, {name:'校园',size:4},
    {name:'科幻',size:4}, {name:'奇幻',size:5}, {name:'冒险',size:3},
    {name:'恋爱',size:3}, {name:'搞笑',size:3}, {name:'战斗',size:3},
    {name:'治愈',size:3}, {name:'悬疑',size:2}, {name:'智斗',size:2},
    {name:'人生',size:2}, {name:'日常',size:3}, {name:'魔法',size:4},
    {name:'战争',size:2}, {name:'机甲',size:2}, {name:'旅行',size:2},
    {name:'时间旅行',size:1}, {name:'学园',size:3}, {name:'心理',size:1}
  ];
  const el = document.getElementById('tagCloud');
  el.innerHTML = allTags.map(t => `<a class="tag s${t.size}" onclick="filterByTag('${t.name}')">${t.name}</a>`).join('');
}
function filterByTag(tag) {
  const filtered = NOVELS.filter(n => n.tags.includes(tag));
  renderNovelGrid(filtered);
  document.getElementById('searchInput').value = '';
  showToast('🏷️ 筛选: ' + tag + ' (' + filtered.length + '部)');
}

/* ---------- 模态框 ---------- */
function openModal(id) {
  const n = NOVELS.find(n => n.id === id);
  if(!n) return;
  const el = document.getElementById('modalBody');
  el.innerHTML = `
    <img src="${n.cover}" alt="${n.title}" onerror="this.style.display='none'">
    <div class="m-info">
      <h2>${n.title}</h2>
      <div class="m-author">✎ ${n.author}</div>
      <div class="m-tags">${n.tags.map(t=>'<span>#'+t+'</span>').join('')}</div>
      <div class="m-desc">${n.desc}</div>
      <div class="m-chapters">📖 共 ${n.chapters} 章 · ${n.status==='completed'?'✅ 已完结':'🔄 连载中'}<br>⭐ ${Formatter.renderStars(n.score)} ${n.score}</div>
      <button class="read-btn" onclick="showToast('📖 开始阅读 ${n.title}')">开始阅读</button>
    </div>`;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
}
document.getElementById('modal').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if(e.key === 'Escape') closeModal();
});
</script>
